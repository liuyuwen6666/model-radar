name: Update Model Pricing

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update model dataset
        run: node scripts/update.js

      - name: Generate changelog
        run: node scripts/diff.js

      - name: Commit and push data updates
        run: |
          git config user.name "model-radar-bot"
          git config user.email "bot@modelradar.cn"
          git add data/
          if git diff --cached --quiet -- data/; then
            echo "No data changes to commit"
            exit 0
          fi
          git commit -m "chore: update model pricing data"
          git push
