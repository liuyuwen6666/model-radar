name: Update Model Pricing

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run update script
        run: npm run update

      - name: Run diff script
        run: npm run diff

      - name: Commit changes
        run: |
          git config user.name "modelradar-bot"
          git config user.email "bot@modelradar.cn"

          git add data/

          git commit -m "auto update pricing" || echo "No changes"

          git push
