name: Update Model Pricing

on:
  schedule:
    - cron: '0 */12 * * *'

  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run update script
        run: node scripts/update.js

      - name: Commit changes
        run: |
          git config user.name "modelradar-bot"
          git config user.email "bot@modelradar.cn"

          git add .

          git commit -m "auto update pricing" || echo "No changes"

          git push